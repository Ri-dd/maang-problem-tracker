<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZ Problems To-Do</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">My AZ Problems</h1>

    <input
      type="text"
      id="search-input"
      placeholder="Search problems..."
    >

    <div class="bookmarks" id="bookmarks"></div>

    <!-- AI Hint feature: button to request a hint + area to show the result -->
    <button id="hint-button" class="hint-button">Get AI Hint</button>
    <div id="hint-result" class="hint-result"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
